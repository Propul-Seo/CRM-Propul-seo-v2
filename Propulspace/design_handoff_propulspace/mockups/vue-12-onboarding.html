<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><title>Vue 12 — Onboarding wizard</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="portal.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; min-height: 100%; background: #f4f1eb; }
    body { font-family: var(--ps-font-sans); padding: 28px 24px 64px; }
    .container { max-width: 1340px; margin: 0 auto; }
    .section-h { margin: 36px auto 16px; max-width: 1340px; }
    .section-h h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; margin: 0; color: #2a2418; }
    .section-h p { font-size: 13px; color: #6b6357; margin: 4px 0 0; }
    .modal-stage { position: relative; overflow: hidden; }
    .backdrop {
      position: absolute; inset: 0; z-index: 25;
      background: rgba(24, 24, 27, 0.55);
      backdrop-filter: blur(4px);
    }
    .modal {
      position: absolute; z-index: 26;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 600px; background: #fff;
      border-radius: 18px;
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.04);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="head"></div>

  <div class="section-h"><h2>Étape 1/3 · "Bienvenue dans votre Propul'Space"</h2></div>
  <div class="container"><div id="step1"></div></div>

  <div class="section-h"><h2>Étape 2/3 · "Payez en 1 clic"</h2></div>
  <div class="container"><div id="step2"></div></div>

  <div class="section-h"><h2>Étape 3/3 · "Signez facilement" — CTA pulsation</h2></div>
  <div class="container"><div id="step3"></div></div>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="desktop-shell.jsx"></script>

  <script type="text/babel">
    function OnboardingStage({ step }) {
      return (
        <div className="modal-stage">
          {/* Greyed-out dashboard behind the modal */}
          <DesktopWindow activeTab="dashboard" minHeight={620} withFab={false}>
            <div style={{ filter: "blur(2px)", opacity: 0.55 }}>
              <Hero
                eyebrow="Tableau de bord"
                title="Bon retour, Sophie"
                subtitle="Voici un aperçu de votre projet aujourd'hui."
                phasePill="Phase 3 sur 8 · Développement"
              />
              <section style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, marginTop: 18 }}>
                <KpiTile eyebrow="Heures" value="42 h" icon="clock" tint="violet" />
                <KpiTile eyebrow="Docs livrés" value="8" icon="file-text" tint="blue" />
                <KpiTile eyebrow="Payé 2026" value="8 000 €" icon="check-circle-2" tint="green" />
                <KpiTile eyebrow="Onboarding" value="60 %" icon="folder-kanban" tint="orange" />
              </section>
            </div>
          </DesktopWindow>

          <div className="backdrop" />

          <div className="modal">
            <Step step={step} />
          </div>
        </div>
      );
    }

    function Step({ step }) {
      if (step === 1) return <Step1 />;
      if (step === 2) return <Step2 />;
      if (step === 3) return <Step3 />;
    }

    function StepShell({ children, currentStep, cta, primaryHighlight }) {
      return (
        <div style={{ position: "relative" }}>
          {/* Close X */}
          <button style={{
            position: "absolute", top: 14, right: 14, zIndex: 2,
            width: 32, height: 32, borderRadius: 9999, border: "none",
            background: "var(--ps-bg-subtle)", color: "var(--ps-fg-muted)",
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <Icon name="x" size={15} stroke={2.2} />
          </button>

          <div style={{ padding: "40px 40px 28px" }}>
            {children}
          </div>

          {/* Footer */}
          <div style={{
            padding: "20px 40px 28px",
            borderTop: "1px solid var(--ps-border-soft)",
            background: "var(--ps-bg)",
            display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
          }}>
            {/* Dots */}
            <div style={{ display: "flex", gap: 8 }}>
              {[1, 2, 3].map(n => (
                <span key={n} style={{
                  width: n === currentStep ? 24 : 7,
                  height: 7, borderRadius: 9999,
                  background: n === currentStep ? "var(--ps-primary)" : "var(--ps-border)",
                  transition: "width 250ms",
                }} />
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {currentStep > 1 && <Button variant="ghost">Précédent</Button>}
              <Button
                variant="primary"
                size="lg"
                iconRight={currentStep === 3 ? "sparkles" : "arrow-right"}
                style={primaryHighlight ? { animation: "ps-fab-pulse 2s ease-in-out infinite" } : {}}
              >{cta}</Button>
            </div>
          </div>
        </div>
      );
    }

    function Step1() {
      return (
        <StepShell currentStep={1} cta="Suivant">
          <div style={{ textAlign: "center" }}>
            <span className="ps-eyebrow">Bienvenue</span>
            <h2 className="ps-gradient-text" style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.025em", margin: "8px 0 12px" }}>
              Bienvenue dans votre Propul'Space !
            </h2>
            <p style={{ fontSize: 14.5, color: "var(--ps-fg-secondary)", lineHeight: 1.6, margin: "0 auto", maxWidth: 440 }}>
              Votre espace personnel pour suivre votre projet, consulter vos documents et gérer vos factures.
            </p>
          </div>

          {/* 4 tab icons */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, marginTop: 32 }}>
            {[
              { icon: "layout-dashboard", label: "Accueil" },
              { icon: "folder-kanban",    label: "Projet" },
              { icon: "file-text",        label: "Documents" },
              { icon: "receipt",          label: "Factures" },
            ].map((t, i) => (
              <div key={i} className="ps-card" style={{ padding: 16, textAlign: "center" }}>
                <span style={{
                  width: 44, height: 44, margin: "0 auto 8px",
                  borderRadius: 11, background: "var(--ps-primary-subtle)", color: "var(--ps-primary-deep)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}><Icon name={t.icon} size={20} stroke={2.2} /></span>
                <div style={{ fontSize: 12.5, fontWeight: 600 }}>{t.label}</div>
              </div>
            ))}
          </div>
        </StepShell>
      );
    }

    function Step2() {
      return (
        <StepShell currentStep={2} cta="Suivant">
          <div style={{ textAlign: "center" }}>
            <span className="ps-eyebrow">Étape 2 sur 3</span>
            <h2 className="ps-gradient-text" style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.025em", margin: "8px 0 12px" }}>
              Payez en 1 clic
            </h2>
            <p style={{ fontSize: 14.5, color: "var(--ps-fg-secondary)", lineHeight: 1.6, margin: "0 auto", maxWidth: 440 }}>
              Quand vous recevez une facture, cliquez sur "Payer". Paiement Stripe sécurisé. Confirmation sous 2 minutes.
            </p>
          </div>

          <div className="ps-card" style={{ marginTop: 28, padding: "14px 18px", display: "flex", alignItems: "center", gap: 14, position: "relative" }}>
            <span style={{ width: 40, height: 40, borderRadius: 10, background: "var(--ps-primary-subtle)", color: "var(--ps-primary-deep)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <Icon name="receipt" size={18} stroke={2.2} />
            </span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: "var(--ps-font-mono)", fontSize: 13, color: "var(--ps-fg-secondary)" }}>PS-1031</div>
              <div className="ps-num" style={{ fontSize: 17, fontWeight: 700, color: "var(--ps-fg)" }}>5 000,00 €</div>
            </div>
            {/* Arrow pointing to button */}
            <div style={{
              position: "absolute", right: 130, top: "50%", transform: "translateY(-50%)",
              color: "var(--ps-primary)", display: "flex", alignItems: "center",
            }}>
              <svg width="40" height="32" viewBox="0 0 40 32" fill="none">
                <path d="M2 16 Q 18 4, 34 16" stroke="currentColor" strokeWidth="1.6" strokeDasharray="3 4" strokeLinecap="round" fill="none" />
                <path d="M30 11 L 36 16 L 30 21" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none" />
              </svg>
            </div>
            <Button variant="primary" iconRight="arrow-up-right">Payer</Button>
          </div>
        </StepShell>
      );
    }

    function Step3() {
      return (
        <StepShell currentStep={3} cta="C'est parti !" primaryHighlight>
          <div style={{ textAlign: "center" }}>
            <span className="ps-eyebrow">Étape 3 sur 3</span>
            <h2 className="ps-gradient-text" style={{ fontSize: 28, fontWeight: 700, letterSpacing: "-0.025em", margin: "8px 0 12px" }}>
              Signez facilement
            </h2>
            <p style={{ fontSize: 14.5, color: "var(--ps-fg-secondary)", lineHeight: 1.6, margin: "0 auto", maxWidth: 440 }}>
              Contrats, devis, avenants — signez en quelques clics depuis votre téléphone ou ordinateur.
            </p>
          </div>

          <div className="ps-card" style={{
            marginTop: 28, padding: 18, position: "relative",
            borderColor: "rgba(124,58,237,0.25)",
            boxShadow: "0 1px 2px rgba(16,24,40,.04), 0 0 0 1px rgba(124,58,237,0.06), 0 4px 14px -4px rgba(124,58,237,0.18)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <span style={{ width: 40, height: 40, borderRadius: 10, background: "var(--ps-primary-subtle)", color: "var(--ps-primary-deep)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <Icon name="pen-line" size={18} stroke={2.2} />
              </span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>Contrat de prestation</div>
                <div style={{ fontSize: 12, color: "var(--ps-fg-muted)" }}>Envoyé le 1 mai · Contrat</div>
              </div>
              <Badge tone="violet">En attente</Badge>
            </div>
            <div style={{
              position: "absolute", right: 124, bottom: -38,
              color: "var(--ps-primary)", display: "flex", alignItems: "center",
            }}>
              <svg width="40" height="32" viewBox="0 0 40 32" fill="none">
                <path d="M2 16 Q 18 28, 34 16" stroke="currentColor" strokeWidth="1.6" strokeDasharray="3 4" strokeLinecap="round" fill="none" />
                <path d="M30 11 L 36 16 L 30 21" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none" />
              </svg>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 12 }}>
              <Button variant="primary" iconRight="arrow-up-right">Signer maintenant</Button>
            </div>
          </div>
        </StepShell>
      );
    }

    function Head() {
      return <PageHead num="12" title="Onboarding wizard — première connexion" subtitle="Modal en 3 étapes, overlay flouté sur le dashboard. Skip toujours possible (X en haut à droite)." />;
    }

    ReactDOM.createRoot(document.getElementById("head")).render(<Head />);
    ReactDOM.createRoot(document.getElementById("step1")).render(<OnboardingStage step={1} />);
    ReactDOM.createRoot(document.getElementById("step2")).render(<OnboardingStage step={2} />);
    ReactDOM.createRoot(document.getElementById("step3")).render(<OnboardingStage step={3} />);
  </script>
</body>
</html>
