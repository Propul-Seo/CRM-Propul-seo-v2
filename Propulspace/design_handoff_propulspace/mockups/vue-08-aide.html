<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><title>Vue 8 — Aide</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="portal.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; min-height: 100%; background: #f4f1eb; }
    body { font-family: var(--ps-font-sans); padding: 28px 24px 64px; }
    .container { max-width: 1340px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="head"></div>
  <div class="container"><div id="state-default"></div></div>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="desktop-shell.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const FAQ = [
      {
        q: "Comment payer une facture ?",
        a: "Rendez-vous dans l'onglet Factures, cliquez sur 'Payer' à droite de la facture concernée. Vous serez redirigé vers Stripe pour un paiement sécurisé en 1 clic (CB ou virement). La confirmation arrive sous 2 minutes.",
      },
      {
        q: "Comment signer un document ?",
        a: "Dans l'onglet Signatures, cliquez 'Signer maintenant' sur le document en attente. La signature électronique se fait dans DocuSeal en quelques secondes — vous recevez le PDF signé par email immédiatement.",
      },
      {
        q: "Comment ajouter un document ?",
        a: "Dans l'onglet Documents, scrollez jusqu'à la zone 'Déposez vos fichiers ici' en bas de page. Glissez-déposez vos fichiers ou cliquez sur 'Parcourir'. Sélectionnez le type (Asset, Contenu, Autre), 25 MB max par fichier.",
      },
      {
        q: "Comment contacter Propul'SEO ?",
        a: "Cliquez sur le bouton violet en bas à droite de toutes les pages. Vous pouvez choisir WhatsApp (réponse en quelques minutes en heures ouvrées) ou email. Nous répondons en moins d'une heure ouvrée.",
      },
      {
        q: "Mes données sont-elles protégées ?",
        a: "Oui. Votre Propul'Space est hébergé en France, chiffré au repos et en transit, conforme RGPD. Vos documents ne sont accessibles qu'à vous et à l'équipe Propul'SEO assignée à votre projet. Nous ne partageons jamais vos données.",
      },
    ];

    function FAQItem({ item, defaultOpen }) {
      const [open, setOpen] = useState(!!defaultOpen);
      return (
        <div style={{ borderBottom: "1px solid var(--ps-border-soft)" }}>
          <button onClick={() => setOpen(!open)} style={{
            width: "100%", padding: "16px 0",
            display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
            background: "transparent", border: "none", cursor: "pointer",
            textAlign: "left",
          }}>
            <span style={{ fontSize: 15, fontWeight: 500, color: "var(--ps-fg)", letterSpacing: "-0.005em" }}>
              {item.q}
            </span>
            <span style={{
              color: open ? "var(--ps-primary)" : "var(--ps-fg-muted)",
              transform: open ? "rotate(180deg)" : "none",
              transition: "transform 200ms",
              flexShrink: 0,
            }}>
              <Icon name="chevron-down" size={18} stroke={2.2} />
            </span>
          </button>
          {open && (
            <div style={{
              padding: "0 0 16px",
              fontSize: 13.5, color: "var(--ps-fg-secondary)", lineHeight: 1.6,
              maxWidth: 720,
            }}>{item.a}</div>
          )}
        </div>
      );
    }

    function AideDesktop() {
      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 360px", gap: 32, alignItems: "flex-start" }}>
          <main>
            <header>
              <div className="ps-eyebrow ps-eyebrow-muted">Aide</div>
              <h1 className="ps-h1 ps-gradient-text" style={{ fontSize: 32, marginTop: 4 }}>Comment pouvons-nous vous aider ?</h1>
              <p style={{ fontSize: 14, color: "var(--ps-fg-secondary)", margin: "6px 0 0", maxWidth: 600 }}>
                Les questions les plus fréquentes. Si la réponse n'est pas ici, contactez-nous directement à droite — on répond en moins d'une heure ouvrée.
              </p>
            </header>

            <section className="ps-card" style={{ padding: "0 24px", marginTop: 24 }}>
              {FAQ.map((f, i) => <FAQItem key={i} item={f} defaultOpen={i === 0} />)}
            </section>

            <section className="ps-card" style={{ padding: 18, marginTop: 16, display: "flex", alignItems: "center", gap: 14 }}>
              <span style={{
                width: 40, height: 40, borderRadius: 10,
                background: "var(--ps-primary-subtle)", color: "var(--ps-primary-deep)",
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
              }}>
                <Icon name="play-circle" size={20} stroke={2.2} />
              </span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>Revoir le tutoriel de bienvenue</div>
                <div style={{ fontSize: 12, color: "var(--ps-fg-muted)", marginTop: 2 }}>3 étapes · 1 minute</div>
              </div>
              <Button variant="outline" icon="play">Lancer</Button>
            </section>
          </main>

          <aside style={{ display: "flex", flexDirection: "column", gap: 12, position: "sticky", top: 8 }}>
            <div className="ps-eyebrow ps-eyebrow-muted">Contact direct</div>
            <ContactCard
              icon="message-square" tint="green"
              title="WhatsApp"
              sub="Réponse en quelques minutes"
              cta="Discuter"
            />
            <ContactCard
              icon="mail" tint="violet"
              title="Email"
              sub="contact@propulseo.fr"
              cta="Envoyer un email"
            />
            <ContactCard
              icon="phone" tint="blue"
              title="Téléphone"
              sub="06 XX XX XX XX · 9h–18h"
              cta="Appeler"
            />
          </aside>
        </div>
      );
    }

    function ContactCard({ icon, tint, title, sub, cta }) {
      const tints = {
        green: { bg: "#D1FAE5", fg: "#047857" },
        violet: { bg: "var(--ps-primary-subtle)", fg: "var(--ps-primary-deep)" },
        blue: { bg: "#DBEAFE", fg: "#1D4ED8" },
      };
      const t = tints[tint] || tints.violet;
      return (
        <div className="ps-card" style={{ padding: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ width: 38, height: 38, borderRadius: 10, background: t.bg, color: t.fg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <Icon name={icon} size={17} stroke={2.2} />
            </span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{title}</div>
              <div style={{ fontSize: 12, color: "var(--ps-fg-muted)", marginTop: 1 }}>{sub}</div>
            </div>
          </div>
          <Button variant="primary" block style={{ marginTop: 12 }} iconRight="arrow-up-right">{cta}</Button>
        </div>
      );
    }

    function Head() {
      return <PageHead num="8" title="Aide — FAQ + contact + tutoriel" subtitle="Accordion FAQ (5 questions), bouton tutoriel, 3 contacts directs en sidebar." />;
    }

    ReactDOM.createRoot(document.getElementById("head")).render(<Head />);
    ReactDOM.createRoot(document.getElementById("state-default")).render(<DesktopWindow activeTab="help"><AideDesktop /></DesktopWindow>);
  </script>
</body>
</html>
