<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><title>Vue 16 — Paiement réussi</title>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; min-height: 100%; background: #f4f1eb; }
  body { font-family: var(--ps-font-sans); padding: 28px 24px 64px; }
  .container { max-width: 1340px; margin: 0 auto; }
  .section-h { margin: 36px auto 16px; max-width: 1340px; }
  .section-h h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; margin: 0; color: #2a2418; }
  .section-h p { font-size: 13px; color: #6b6357; margin: 4px 0 0; }
</style>
</head>
<body>
<div id="head"></div>

    <div class="section-h"><h2>Paiement confirmé</h2></div>
    <div class="container"><div id="s-ok"></div></div>

<script type="text/babel" src="_lib/primitives.jsx"></script>
<script type="text/babel" src="_lib/shell.jsx"></script>
<script type="text/babel" src="_lib/desktop-shell.jsx"></script>
<script type="text/babel" src="_lib/admin-shell.jsx"></script>
<script type="text/babel" src="_lib/v2-shared.jsx"></script>

<script type="text/babel">
function Head() {
  return <PageHead num="16" title="Retour de Stripe — Paiement reçu" subtitle="Page autonome après redirection Stripe (session_id en query)." />;
}

function Custom() {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      padding: "4px 12px", borderRadius: 9999, marginBottom: 16,
      background: "var(--ps-success-subtle)", color: "#166534",
      fontSize: 11.5, fontWeight: 600,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 9999, background: "var(--ps-success)" }} />
      Confirmé par Stripe
    </span>
  );
}
function S() {
  return (
    <StatusPage
      shellUrl="espace.propulseo-site.com/factures/paiement/success?session_id=cs_test_a1b2c3"
      iconName="check"
      iconTone="green"
      customBadge={<Custom />}
      title="Paiement reçu"
      subtitle="Votre paiement a bien été traité. Merci."
      details={
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span>Facture</span>
            <span style={{ fontFamily: "var(--ps-font-mono)", color: "var(--ps-fg)", fontWeight: 500 }}>PS-1031</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span>Montant</span>
            <span className="ps-num ps-gradient-text" style={{ fontWeight: 700, fontSize: 16 }}>5 000,00 €</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span>Date de paiement</span>
            <span className="ps-num" style={{ color: "var(--ps-fg)", fontWeight: 500 }}>15 mai 2026 · 14:22</span>
          </div>
          <div style={{ marginTop: 6, paddingTop: 8, borderTop: "1px solid var(--ps-border)", fontSize: 12, color: "var(--ps-fg-muted)" }}>
            Vous recevrez le reçu officiel par email d'ici quelques minutes.
          </div>
        </div>
      }
      primaryCta="Retour à mon espace"
      primaryHref="/espace-client"
      secondaryCta="Télécharger le reçu"
    />
  );
}
ReactDOM.createRoot(document.getElementById("head")).render(<Head />);
ReactDOM.createRoot(document.getElementById("s-ok")).render(<S />);
</script>
