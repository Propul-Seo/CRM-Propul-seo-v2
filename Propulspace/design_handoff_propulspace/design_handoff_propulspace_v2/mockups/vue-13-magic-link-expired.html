<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><title>Vue 13 — Magic link expiré</title>
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<link rel="stylesheet" href="../tokens/portal.css">
<link rel="stylesheet" href="../tokens/admin.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; min-height: 100%; background: #f4f1eb; }
  body { font-family: var(--ps-font-sans); padding: 28px 24px 64px; }
  .container { max-width: 1340px; margin: 0 auto; }
  .section-h { margin: 36px auto 16px; max-width: 1340px; }
  .section-h h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; margin: 0; color: #2a2418; }
  .section-h p { font-size: 13px; color: #6b6357; margin: 4px 0 0; }
</style>
</head>
<body>
<div id="head"></div>

    <div class="section-h"><h2>État expiré</h2></div>
    <div class="container"><div id="s-expired"></div></div>
    <div class="section-h"><h2>État invalide (autre raison)</h2></div>
    <div class="container"><div id="s-invalid"></div></div>

<script type="text/babel" src="_lib/primitives.jsx"></script>
<script type="text/babel" src="_lib/shell.jsx"></script>
<script type="text/babel" src="_lib/desktop-shell.jsx"></script>
<script type="text/babel" src="_lib/admin-shell.jsx"></script>
<script type="text/babel" src="_lib/v2-shared.jsx"></script>

<script type="text/babel">
function Head() {
  return <PageHead num="13" title="Magic link expiré ou invalide" subtitle="Le lien magique n'est valable que 15 minutes. Page autonome (pas de PortalLayout)." />;
}

function S({ kind }) {
  if (kind === "expired") {
    return (
      <StatusPage
        shellUrl="espace.propulseo-site.com/login?error=expired"
        iconName="clock"
        iconTone="violet"
        title="Ce lien n'est plus valide"
        subtitle="Pour votre sécurité, les liens de connexion expirent au bout de 15 minutes. Aucun problème — on vous en renvoie un tout de suite."
        primaryCta="Recevoir un nouveau lien"
        primaryHref="/espace-client/login"
        secondaryCta="Besoin d'aide ? Contactez-nous"
        footnote="© 2026 Propul'SEO · Hébergé en France 🇫🇷"
      />
    );
  }
  return (
    <StatusPage
      shellUrl="espace.propulseo-site.com/login?error=invalid"
      iconName="alert-circle"
      iconTone="orange"
      title="Lien non reconnu"
      subtitle="Ce lien semble avoir déjà été utilisé ou modifié. Demandez-en un nouveau, on s'occupe du reste."
      primaryCta="Recevoir un nouveau lien"
      primaryHref="/espace-client/login"
      secondaryCta="Contacter le support"
      footnote="© 2026 Propul'SEO · Hébergé en France 🇫🇷"
    />
  );
}
ReactDOM.createRoot(document.getElementById("head")).render(<Head />);
ReactDOM.createRoot(document.getElementById("s-expired")).render(<S kind="expired" />);
    ReactDOM.createRoot(document.getElementById("s-invalid")).render(<S kind="invalid" />);
</script>
</body></html>
