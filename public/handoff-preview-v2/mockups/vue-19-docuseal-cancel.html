<body>
<div id="head"></div>

<script type="text/babel">
function Head() {
  return <PageHead num="19" title="Retour de DocuSeal — Signature non finalisée" subtitle="Le signataire a quitté DocuSeal sans signer. Ton neutre." />;
}

function S() {
  return (
    <StatusPage
      shellUrl="espace.propulseo-site.com/signatures/sign/cancel"
      iconName="alert-circle"
      iconTone="orange"
      title="Signature interrompue"
      subtitle="Vous pouvez revenir signer plus tard. Le document reste disponible dans votre espace tant qu'il n'a pas expiré."

        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span>Document</span>
            <span style={{ color: "var(--ps-fg)", fontWeight: 500 }}>Avenant SEO mensuel</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span>Expire le</span>
            <span className="ps-num" style={{ color: "var(--ps-fg)", fontWeight: 500 }}>29 mai 2026</span>
          </div>
        </div>
      }
      primaryCta="Reprendre la signature"
      primaryHref="/espace-client/signatures"
      secondaryCta="Retour à mon espace"
    />
  );
}
ReactDOM.createRoot(document.getElementById("head")).render(<Head />);
ReactDOM.createRoot(document.getElementById("s-cancel")).render(<S />);
</script>
