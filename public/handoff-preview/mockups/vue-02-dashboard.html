<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vue 2 — Dashboard client</title>
  <link rel="stylesheet" href="../tokens/colors_and_type.css">
  <link rel="stylesheet" href="../tokens/portal.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; min-height: 100%; background: #f4f1eb; }
    body { font-family: var(--ps-font-sans); padding: 28px 24px 64px; }
    .container { max-width: 1340px; margin: 0 auto; }
    .section-h { margin: 36px auto 16px; max-width: 1340px; }
    .section-h h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; margin: 0; color: #2a2418; }
    .section-h p { font-size: 13px; color: #6b6357; margin: 4px 0 0; }
  </style>
</head>
<body>
  <div id="head"></div>

  <div class="section-h"><h2>État normal · projet en cours, 1 action requise</h2><p>"Le money shot". Le client comprend en 5 secondes où il en est.</p></div>
  <div class="container"><div id="state-default"></div></div>

  <div class="section-h"><h2>Empty state · portail fraîchement activé</h2><p>Le projet vient d'être activé, aucune donnée à afficher.</p></div>
  <div class="container"><div id="state-empty"></div></div>

  <div class="section-h"><h2>Loading state · skeletons violets</h2><p>Premier chargement après authentification.</p></div>
  <div class="container"><div id="state-loading"></div></div>

  <script type="text/babel" src="_lib/primitives.jsx"></script>
  <script type="text/babel" src="_lib/shell.jsx"></script>
  <script type="text/babel" src="_lib/desktop-shell.jsx"></script>
  <script type="text/babel" src="_lib/screens-dashboard.jsx"></script>
  <script type="text/babel" src="_lib/screens-dashboard-desktop.jsx"></script>

  <script type="text/babel">
    /* Empty state for fresh portal activation */
    function DashboardEmptyState() {
      return (
        <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 24 }}>
          <aside style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <section className="ps-card" style={{ padding: 22, textAlign: "center", position: "relative", overflow: "hidden" }}>
              <span className="ps-hero-blur" />
              <div style={{
                width: 56, height: 56, margin: "0 auto 14px",
                borderRadius: 14, background: "var(--ps-primary-subtle)",
                color: "var(--ps-primary-deep)",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                <Icon name="rocket" size={26} stroke={1.9} />
              </div>
              <div className="ps-h3" style={{ marginBottom: 4 }}>Projet à venir</div>
              <p style={{ fontSize: 12.5, color: "var(--ps-fg-secondary)", margin: 0, lineHeight: 1.5 }}>
                Votre projet démarre bientôt. Nous préparons tout pour vous.
              </p>
            </section>
            <section className="ps-card" style={{ padding: 18 }}>
              <div className="ps-eyebrow ps-eyebrow-muted" style={{ marginBottom: 8 }}>Votre contact</div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 8 }}>
                <div style={{ width: 36, height: 36, borderRadius: 9999, background: "linear-gradient(135deg, #f59e0b, #b45309)", color: "#fff", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>LT</div>
                <div>
                  <div style={{ fontSize: 13.5, fontWeight: 600 }}>Lyes Triki</div>
                  <div style={{ fontSize: 11.5, color: "var(--ps-fg-muted)" }}>Directeur de projet</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <Button variant="primary" size="sm" icon="message-square">WhatsApp</Button>
                <Button variant="outline" size="sm" icon="mail">Email</Button>
              </div>
            </section>
          </aside>
          <main style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <div className="ps-eyebrow ps-eyebrow-muted">Vendredi 15 mai · 14:22</div>
              <h1 className="ps-h1 ps-gradient-text" style={{ fontSize: 32, marginTop: 4 }}>Bienvenue dans votre Propul'Space</h1>
            </div>
            <EmptyState
              icon="sparkles"
              title="Votre projet démarre bientôt."
              body="Nous préparons tout pour vous. Vous recevrez un email dès que les premières étapes seront disponibles."
              action={<Button variant="primary" icon="message-circle">Contacter Propul'SEO</Button>}
            />
          </main>
        </div>
      );
    }

    /* Loading state — sidebar + main column skeletons */
    function DashboardLoading() {
      return (
        <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 24 }}>
          <aside style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <section className="ps-card" style={{ padding: 22 }}>
              <Skeleton w="40%" h={11} />
              <Skeleton w="80%" h={20} style={{ marginTop: 10 }} />
              <Skeleton w="50%" h={11} style={{ marginTop: 6 }} />
              <Skeleton w="60%" h={48} style={{ marginTop: 18 }} />
              <Skeleton w="100%" h={6} r={9999} style={{ marginTop: 12 }} />
            </section>
            <section className="ps-card" style={{ padding: 18 }}>
              <Skeleton w="50%" h={11} />
              <div style={{ display: "flex", gap: 10, marginTop: 14, alignItems: "center" }}>
                <Skeleton w={44} h={44} r={10} />
                <div style={{ flex: 1 }}>
                  <Skeleton w="80%" h={12} />
                  <Skeleton w="50%" h={10} style={{ marginTop: 6 }} />
                </div>
              </div>
            </section>
          </aside>
          <main style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <Skeleton w="40%" h={14} />
            <Skeleton w="60%" h={28} />
            <section className="ps-card" style={{ padding: 22 }}>
              <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                <Skeleton w={52} h={52} r={14} />
                <div style={{ flex: 1 }}>
                  <Skeleton w="30%" h={11} />
                  <Skeleton w="70%" h={18} style={{ marginTop: 8 }} />
                  <Skeleton w="50%" h={12} style={{ marginTop: 6 }} />
                </div>
                <Skeleton w={140} h={48} r={10} />
              </div>
            </section>
            <section style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12 }}>
              {[0,1,2,3].map(i => (
                <div key={i} className="ps-card" style={{ padding: 18 }}>
                  <Skeleton w="60%" h={10} />
                  <Skeleton w="40%" h={24} style={{ marginTop: 10 }} />
                  <Skeleton w="80%" h={11} style={{ marginTop: 6 }} />
                </div>
              ))}
            </section>
            <section style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div className="ps-card" style={{ padding: 18, display: "flex", flexDirection: "column", gap: 12 }}>
                {[0,1,2,3].map(i => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <Skeleton w={32} h={32} r={9999} />
                    <div style={{ flex: 1 }}>
                      <Skeleton w="70%" h={11} />
                      <Skeleton w="40%" h={10} style={{ marginTop: 5 }} />
                    </div>
                  </div>
                ))}
              </div>
              <div className="ps-card" style={{ padding: 18, display: "flex", flexDirection: "column", gap: 12 }}>
                {[0,1,2,3].map(i => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "center" }}>
                    <Skeleton w={34} h={34} r={9} />
                    <div style={{ flex: 1 }}>
                      <Skeleton w="70%" h={11} />
                      <Skeleton w="40%" h={10} style={{ marginTop: 5 }} />
                    </div>
                  </div>
                ))}
              </div>
            </section>
          </main>
        </div>
      );
    }

    function Head() {
      return <PageHead num="2" title="Dashboard client — V2 sidebar focus" subtitle='La V2 que tu as validée. Sidebar permanente avec le projet en grand, "wow" sur le chiffre "65 %", contact toujours accessible. Le reste à droite, aéré.' />;
    }

    ReactDOM.createRoot(document.getElementById("head")).render(<Head />);
    ReactDOM.createRoot(document.getElementById("state-default")).render(
      <DesktopWindow activeTab="dashboard"><DashboardDesktopV2 /></DesktopWindow>
    );
    ReactDOM.createRoot(document.getElementById("state-empty")).render(
      <DesktopWindow activeTab="dashboard" minHeight={520}><DashboardEmptyState /></DesktopWindow>
    );
    ReactDOM.createRoot(document.getElementById("state-loading")).render(
      <DesktopWindow activeTab="dashboard" minHeight={760}><DashboardLoading /></DesktopWindow>
    );
  </script>
</body>
</html>
